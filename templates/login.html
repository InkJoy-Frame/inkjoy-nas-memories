<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkJoy Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo-square.png') }}">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card shadow-lg">

      <!-- Lang toggle top-right -->
      <div class="text-end mb-2">
        <button id="langBtn" class="btn btn-sm btn-outline-secondary px-2 py-0"
                style="font-size:.75rem;"
                onclick="setLang(getLang()==='en'?'zh':'en')">中文</button>
      </div>

      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='images/logo-dark.png') }}"
             alt="InkJoy" class="login-brand-img mb-3">
        <h1 class="h5 fw-bold text-body mb-2" data-i18n="login.title">ePaper Frame Manager</h1>
        <p class="text-muted small mb-0 px-1 login-brand-tagline" data-i18n="login.tagline">Turn your NAS into a living photo stream for InkJoy Frame.</p>
      </div>

      <div id="alertBox" class="alert d-none mb-3 py-2"></div>

      <form id="loginForm" autocomplete="on">
        <div class="mb-3">
          <label class="form-label fw-semibold" data-i18n="login.server">Server Region</label>
          <div class="d-flex gap-2">
            <div class="flex-fill">
              <input type="radio" class="btn-check" name="server" id="serverGlobal" value="global" checked>
              <label class="btn btn-outline-primary w-100" for="serverGlobal">
                <i class="bi bi-globe2 me-1"></i><span data-i18n="login.global">Global Server</span>
              </label>
            </div>
            <div class="flex-fill">
              <input type="radio" class="btn-check" name="server" id="serverChina" value="china">
              <label class="btn btn-outline-danger w-100" for="serverChina">
                <i class="bi bi-flag-fill me-1"></i><span data-i18n="login.china">China Server</span>
              </label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold" data-i18n="login.email">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email"
                   data-i18n-ph="login.email.ph"
                   placeholder="your@email.com"
                   autocomplete="email" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold" data-i18n="login.pwd">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password"
                   data-i18n-ph="login.pwd.ph"
                   placeholder="Password"
                   autocomplete="current-password" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
          <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner"></span>
          <i class="bi bi-box-arrow-in-right me-1"></i>
          <span data-i18n="login.submit">Login</span>
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#togglePwd i');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const alertBox = document.getElementById('alertBox');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      alertBox.classList.add('d-none');

      const server = document.querySelector('input[name="server"]:checked').value;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ server, email, password }),
        });
        const data = await resp.json();
        if (data.success) {
          window.location.href = '/dashboard';
        } else {
          alertBox.className = 'alert alert-danger mb-3 py-2';
          alertBox.innerHTML = `<i class="bi bi-exclamation-triangle me-1"></i>${data.error || t('login.err.default')}`;
          alertBox.classList.remove('d-none');
          btn.disabled = false;
          spinner.classList.add('d-none');
        }
      } catch (err) {
        alertBox.className = 'alert alert-danger mb-3 py-2';
        alertBox.innerHTML = `<i class="bi bi-wifi-off me-1"></i>${t('login.err.net')}`;
        alertBox.classList.remove('d-none');
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
