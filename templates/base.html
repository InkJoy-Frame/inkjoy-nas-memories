<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InkJoy Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo-square.png') }}">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
  <script>
    // 当前登录账号 ID，供各页面的设备缓存做账号隔离
    window.INKJOY_ACCOUNT_ID = {{ session.get('account_id', 0) | tojson }};

    // 全局 fetch 拦截：API 返回 401 时自动跳转登录页（session 过期或 token 失效）
    const _origFetch = window.fetch;
    window.fetch = async function(...args) {
      const resp = await _origFetch(...args);
      if (resp.status === 401) {
        const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '';
        if (url.startsWith('/api/')) {
          window.location.href = '/login';
          return resp;
        }
      }
      return resp;
    };
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  {% if session.get('token') %}
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center py-0" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='images/logo-white.png') }}"
             alt="InkJoy" class="navbar-brand-img">
      </a>
      <div class="navbar-nav ms-auto flex-row gap-1 align-items-center">
        <a class="nav-link px-3 {% if request.endpoint == 'dashboard' %}active{% endif %}"
           href="{{ url_for('dashboard') }}">
          <i class="bi bi-grid-1x2"></i>
          <span class="d-none d-sm-inline ms-1" data-i18n="nav.devices">Devices</span>
        </a>
        <a class="nav-link px-3 {% if request.endpoint == 'upload' %}active{% endif %}"
           href="{{ url_for('upload') }}">
          <i class="bi bi-cloud-upload"></i>
          <span class="d-none d-sm-inline ms-1" data-i18n="nav.upload">Upload</span>
        </a>
        <a class="nav-link px-3 {% if request.endpoint == 'schedules' %}active{% endif %}"
           href="{{ url_for('schedules') }}">
          <i class="bi bi-clock-history"></i>
          <span class="d-none d-sm-inline ms-1" data-i18n="nav.schedules">Schedules</span>
        </a>
        <!-- Language toggle -->
        <button id="langBtn" class="btn btn-sm btn-outline-light ms-2 px-2 py-1"
                style="font-size:.75rem;min-width:2.5rem;"
                onclick="setLang(getLang()==='en'?'zh':'en')">中文</button>
        <a class="nav-link px-3 ms-1" href="{{ url_for('logout') }}">
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-sm-inline ms-1" data-i18n="nav.logout">Logout</span>
        </a>
      </div>
    </div>
  </nav>
  {% endif %}

  <div class="{% if session.get('token') %}container-fluid px-4 py-4{% endif %}">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
